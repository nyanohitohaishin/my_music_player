name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate iOS project
        run: |
          rm -rf ios/
          flutter create --platforms=ios .

      - name: Add iOS Permissions
        run: |
          plutil -insert UIBackgroundModes -json '["audio"]' ios/Runner/Info.plist
          plutil -insert NSPhotoLibraryUsageDescription -string "ローカルの音楽ファイルを読み込むためにアクセス権限が必要です。" ios/Runner/Info.plist
          plutil -insert NSAppleMusicUsageDescription -string "ローカルの音楽ファイルを読み込むためにアクセス権限が必要です。" ios/Runner/Info.plist

      - name: Patch Podfile for Rust/Strap
        run: |
          ruby -i -e "
            content = File.read('ios/Podfile')
            content.sub!(/# platform :ios, .*/, 'platform :ios, \"13.0\"')
            injection = <<-RUBY
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['STRIP_STYLE'] = 'non-global'
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            RUBY
            content.sub!('flutter_additional_ios_build_settings(target)', injection)
            File.write('ios/Podfile', content)
          "

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Package into IPA
        run: |
          mkdir Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -qq -r my_music_player.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: my_music_player-ios
          path: my_music_player.ipa